<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TecPharma">
<meta name="theme-color" content="#0a1628">
<title>TecPharma — Hassan Alenezy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --dark: #0a1628;
  --blue: #1B4F72;
  --accent: #2E86C1;
  --light: #AED6F1;
  --white: #ffffff;
}

html, body {
  height: 100%;
  background: var(--dark);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  user-select: none;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: -webkit-fill-available;
}

/* Background */
.bg {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 20% 50%, #0d2137 0%, #0a1628 60%);
  z-index: 0;
}
.bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 80% 20%, rgba(46,134,193,0.08) 0%, transparent 50%),
    radial-gradient(circle at 10% 80%, rgba(27,79,114,0.12) 0%, transparent 40%);
}

/* Grid lines */
.grid {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0.04;
  background-image:
    linear-gradient(rgba(174,214,241,0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(174,214,241,0.5) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Card container */
.card-wrapper {
  position: relative;
  z-index: 10;
  width: 340px;
  perspective: 1200px;
  cursor: pointer;
}

.card {
  width: 100%;
  aspect-ratio: 1.586 / 1;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
  border-radius: 18px;
}

.card.flipped { transform: rotateY(180deg); }

/* Front & Back */
.card-front, .card-back {
  position: absolute;
  inset: 0;
  border-radius: 18px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
}

/* ── FRONT ── */
.card-front {
  background: linear-gradient(135deg, #0d1f35 0%, #0a1628 50%, #0d2440 100%);
  border: 1px solid rgba(46,134,193,0.2);
  box-shadow:
    0 30px 80px rgba(0,0,0,0.6),
    0 0 0 1px rgba(255,255,255,0.04),
    inset 0 1px 0 rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 24px 26px 22px;
}

/* Circuit watermark */
.circuit {
  position: absolute;
  bottom: -20px;
  left: -15px;
  opacity: 0.06;
  pointer-events: none;
}

/* Holographic shimmer */
.shimmer {
  position: absolute;
  inset: 0;
  border-radius: 18px;
  background: linear-gradient(
    105deg,
    transparent 40%,
    rgba(174,214,241,0.04) 50%,
    transparent 60%
  );
  animation: shimmer 4s ease-in-out infinite;
}
@keyframes shimmer {
  0%,100% { transform: translateX(-100%); }
  50% { transform: translateX(100%); }
}

/* Top chip + name */
.front-top {
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  z-index: 2;
}

.chip-logo {
  width: 46px;
  height: 46px;
  flex-shrink: 0;
}

.front-title {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 0.3px;
  line-height: 1;
}
.front-title span { color: var(--accent); }

.front-subtitle {
  font-size: 9px;
  color: rgba(174,214,241,0.35);
  letter-spacing: 3px;
  margin-top: 5px;
  font-weight: 500;
}

/* Tagline */
.front-bottom {
  position: relative;
  z-index: 2;
}
.tagline-bar {
  width: 32px;
  height: 2px;
  background: var(--accent);
  border-radius: 2px;
  margin-bottom: 10px;
}
.tagline {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 13.5px;
  color: rgba(174,214,241,0.75);
  letter-spacing: 0.2px;
}

/* ── BACK ── */
.card-back {
  background: #f4f7fa;
  border: 1px solid rgba(27,79,114,0.1);
  box-shadow:
    0 30px 80px rgba(0,0,0,0.5),
    0 0 0 1px rgba(255,255,255,0.8);
  transform: rotateY(180deg);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 22px 24px 20px;
  overflow: hidden;
}

/* Left accent */
.back-accent {
  position: absolute;
  left: 0; top: 0;
  width: 5px; height: 100%;
  background: linear-gradient(180deg, var(--blue), var(--accent));
  border-radius: 18px 0 0 18px;
}

/* Back watermark */
.back-watermark {
  position: absolute;
  right: -15px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.04;
  pointer-events: none;
}

/* Back top */
.back-top {
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
  z-index: 2;
}

.back-name {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--blue);
  line-height: 1.2;
}
.back-role {
  display: inline-block;
  background: #EBF5FB;
  border: 1px solid #AED6F1;
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 9.5px;
  color: var(--blue);
  font-weight: 600;
  margin-top: 4px;
  letter-spacing: 0.3px;
}

/* Divider */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, #d1dce8, transparent);
  position: relative;
  z-index: 2;
}

/* Contacts */
.contacts {
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
  z-index: 2;
}
.contact-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: #334155;
  text-decoration: none;
}
.contact-icon {
  width: 20px;
  height: 20px;
  background: #EBF5FB;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  flex-shrink: 0;
}
.contact-item.web {
  color: var(--accent);
  font-weight: 600;
  font-size: 10.5px;
}

/* Flip hint */
.flip-hint {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: rgba(174,214,241,0.35);
  letter-spacing: 1px;
  z-index: 20;
  animation: pulse-hint 3s ease-in-out infinite;
}
@keyframes pulse-hint {
  0%,100% { opacity: 0.4; }
  50% { opacity: 0.7; }
}
.flip-hint svg { animation: spin-arrow 3s ease-in-out infinite; }
@keyframes spin-arrow {
  0%,100% { transform: rotate(0deg); }
  50% { transform: rotate(180deg); }
}

/* Add to home instruction */
.add-home {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(46,134,193,0.12);
  border: 1px solid rgba(46,134,193,0.25);
  border-radius: 20px;
  padding: 6px 16px;
  font-size: 11px;
  color: rgba(174,214,241,0.6);
  letter-spacing: 0.5px;
  z-index: 20;
  white-space: nowrap;
}

/* Card entrance animation */
.card-wrapper {
  animation: card-in 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes card-in {
  from { opacity: 0; transform: translateY(40px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
</style>
</head>

<script>
function flipCard(){
  document.getElementById('card').classList.toggle('flipped');
}
// Tilt effect on desktop
const wrapper = document.querySelector('.card-wrapper');
wrapper.addEventListener('mousemove', e => {
  const rect = wrapper.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width - 0.5;
  const y = (e.clientY - rect.top) / rect.height - 0.5;
  const card = document.getElementById('card');
  if(!card.classList.contains('flipped')){
    card.style.transform = `rotateY(${x*12}deg) rotateX(${-y*8}deg)`;
  }
});
wrapper.addEventListener('mouseleave', () => {
  const card = document.getElementById('card');
  if(!card.classList.contains('flipped')){
    card.style.transform = '';
  }
});
</script>
